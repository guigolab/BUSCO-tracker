name: BUSCO Matrix Analysis

on:
  workflow_dispatch:
    inputs:
      max_per_job:
        description: 'Max annotations per matrix job (keep low to stay within 6h job limit)'
        required: false
        default: '10'
  push:
    branches:
      - main
    paths:
      - 'annotations.tsv'

permissions:
  contents: write
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Compute how many chunks are needed and build the matrix
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix:        ${{ steps.build.outputs.matrix }}
      chunk_count:   ${{ steps.build.outputs.chunk_count }}
      pending_count: ${{ steps.build.outputs.pending_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build matrix
        id: build
        run: python scripts/build_matrix.py annotations.tsv BUSCO/eukaryota_odb12/BUSCO.tsv BUSCO/eukaryota_odb12/error_log.tsv --max-per-job ${{ github.event.inputs.max_per_job || '10' }}

      - name: Summary
        run: |
          echo "Pending annotations : ${{ steps.build.outputs.pending_count }}"
          echo "Chunks to create    : ${{ steps.build.outputs.chunk_count }}"
          echo "Max per job         : ${{ github.event.inputs.max_per_job || '10' }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Run BUSCO analysis in parallel matrix jobs
  # ─────────────────────────────────────────────────────────────────────────────
  busco:
    needs: setup
    if: ${{ needs.setup.outputs.pending_count > 0 }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # one failing job must NOT cancel the other 255
      max-parallel: 256
      matrix:
        chunk_index: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          python-version: '3.11'
          miniforge-version: latest
          channels: conda-forge,bioconda
          channel-priority: strict
          use-mamba: true
          conda-remove-defaults: true
          activate-environment: busco-env

      - name: Cache conda environment
        id: conda-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CONDA }}/envs/busco-env
          key: conda-${{ runner.os }}-busco6.0.0-gffread0.12.07-annocli1.0.0

      - name: Install BUSCO and gffread
        if: steps.conda-cache.outputs.cache-hit != 'true'
        shell: bash -el {0}
        run: |
          mamba install -y -c conda-forge -c bioconda \
            "busco==6.0.0" \
            "gffread==0.12.7"

      - name: Install annocli
        if: steps.conda-cache.outputs.cache-hit != 'true'
        shell: bash -el {0}
        run: |
          git clone --branch v1.0.0 --depth 1 https://github.com/apollo994/annocli.git
          pip install ./annocli/

      - name: Run batch
        shell: bash -el {0}
        run: |
          python scripts/run_busco_batch.py \
            annotations.tsv \
            BUSCO/eukaryota_odb12/BUSCO.tsv \
            BUSCO/eukaryota_odb12/error_log.tsv \
            ${{ matrix.chunk_index }} \
            ${{ needs.setup.outputs.chunk_count }} \
            batch_output/ \
            ${{ github.event.inputs.max_per_job || '10' }}

      - name: Upload batch artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: busco-batch-${{ matrix.chunk_index }}
          path: batch_output/
          retention-days: 30
          overwrite: true

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Aggregate all artifacts into BUSCO.tsv and error_log.tsv
  # ─────────────────────────────────────────────────────────────────────────────
  aggregate:
    needs: [setup, busco]
    # Run even if some busco jobs failed — commit partial results
    # but skip if the workflow was manually cancelled
    if: ${{ !cancelled() && needs.setup.outputs.pending_count > 0 }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all batch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: busco-batch-*
          path: artifacts/
          merge-multiple: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Aggregate results
        run: python scripts/aggregate_results.py artifacts/ BUSCO/eukaryota_odb12/BUSCO.tsv BUSCO/eukaryota_odb12/error_log.tsv

      - name: Display summary
        run: |
          echo "=== BUSCO.tsv — last 10 rows ==="
          tail -n 10 BUSCO/eukaryota_odb12/BUSCO.tsv
          echo ""
          echo "=== error_log.tsv — last 10 rows ==="
          tail -n 10 BUSCO/eukaryota_odb12/error_log.tsv

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add BUSCO/eukaryota_odb12/BUSCO.tsv BUSCO/eukaryota_odb12/error_log.tsv
          if git diff --staged --quiet; then
            echo "No new results to commit"
          else
            ADDED=$(git diff --staged BUSCO/eukaryota_odb12/BUSCO.tsv | grep '^+' | grep -v '^+++' | wc -l | tr -d ' ')
            ERRORS=$(git diff --staged BUSCO/eukaryota_odb12/error_log.tsv | grep '^+' | grep -v '^+++' | wc -l | tr -d ' ')
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "Aggregate BUSCO results — ${TIMESTAMP}, +${ADDED} annotations, +${ERRORS} error_log rows"
            git pull --rebase
            git push
          fi
