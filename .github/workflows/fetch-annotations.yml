name: Fetch Annotations

on:
  schedule:
    # - cron: '0 12 * * 0'  # Weekly on Sunday at 12 PM UTC
    - cron: '0 */4 * * *'  # Every 4 hours (testing)
  workflow_dispatch:

permissions:
  contents: write  # Required to push commits

jobs:
  fetch-annotations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Fetch annotations and generate TSV
        run: python scripts/fetch_annotations.py
        
      - name: Commit and push TSV file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add annotations.tsv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update annotations.tsv - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
      
      - name: Log workflow execution to annotations.log
        run: |
          python3 << 'EOF'
          import csv
          import subprocess
          from datetime import datetime
          
          timestamp = datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          
          # Get diff stats
          diff_output = subprocess.run(['git', 'diff', 'HEAD~1', 'HEAD', '--numstat', 'annotations.tsv'], 
                                      capture_output=True, text=True).stdout.strip()
          if diff_output:
              parts = diff_output.split('\t')
              added = parts[0] if len(parts) > 0 else "NA"
              removed = parts[1] if len(parts) > 1 else "NA"
          else:
              added = removed = "NA"
          
          # Count total lines in annotations.tsv
          with open('annotations.tsv', 'r') as f:
              total = sum(1 for _ in f) - 1  # Exclude header
          
          # Append to log
          with open('logs/annotations.log', 'a') as f:
              writer = csv.writer(f, delimiter='\t', lineterminator='\n')
              writer.writerow([timestamp, added, removed, total])
          EOF
          git add logs/annotations.log
          git commit -m "Update annotations.log - $(date '+%Y-%m-%d %H:%M:%S UTC')"
          git push
