name: Fetch Annotations

on:
  schedule:
    # - cron: '0 12 * * 0'  # Weekly on Sunday at 12 PM UTC
    - cron: '*/10 * * * *'  # Every 10 minutes (testing)
  workflow_dispatch:

permissions:
  contents: write  # Required to push commits

jobs:
  fetch-annotations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Fetch annotations and generate TSV
        run: python scripts/fetch_annotations.py
        
      - name: Commit and push TSV file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add annotations.tsv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update annotations.tsv - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
